
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convite Ricardo</title>

<style>

body {
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#111,#c9a227,#fff);
overflow:hidden;
color:white;
}

.page {
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
}

.active {
display:flex;
}

.card {
background:rgba(0,0,0,0.35);
padding:30px;
border-radius:30px;
max-width:430px;
backdrop-filter:blur(10px);
box-shadow:0 0 30px rgba(255,215,0,0.35);
animation:fade 1s ease;
}

@keyframes fade {
from {
opacity:0;
transform:scale(0.9);
}
to {
opacity:1;
transform:scale(1);
}
}

img {
width:240px;
height:320px;
object-fit:cover;
border-radius:25px;
border:4px solid gold;
margin-bottom:20px;
}

h1 {
color:#ffe082;
font-size:2.3rem;
}

p {
font-size:1.08rem;
line-height:1.6;
}

button,a {
margin-top:16px;
padding:14px 26px;
border:none;
border-radius:35px;
background:linear-gradient(45deg,#f5d76e,#fff4c4);
color:black;
font-weight:bold;
text-decoration:none;
display:inline-block;
cursor:pointer;
transition:0.3s;
}

button:hover,a:hover {
transform:scale(1.05);
}

.spark {
position:absolute;
width:7px;
height:7px;
background:gold;
border-radius:50%;
opacity:0.5;
animation:subir linear infinite;
}

@keyframes subir {
from {
transform:translateY(100vh);
}
to {
transform:translateY(-100px);
}
}

</style>
</head>
